name: Publish to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io
        run: cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Clean Cargo artifacts
        run: cargo clean

      - name: Publish threecrate-core
        run: bash scripts/publish-if-needed.sh threecrate-core

      - name: Wait for indexing
        run: sleep 30

      - name: Publish threecrate-algorithms
        run: bash scripts/publish-if-needed.sh threecrate-algorithms

      - name: Wait for indexing
        run: sleep 30

      - name: Publish threecrate-io
        run: bash scripts/publish-if-needed.sh threecrate-io

      - name: Wait for indexing
        run: sleep 30

      - name: Publish threecrate-simplification
        run: bash scripts/publish-if-needed.sh threecrate-simplification

      - name: Wait for indexing
        run: sleep 90

      - name: Publish threecrate-gpu
        run: bash scripts/publish-if-needed.sh threecrate-gpu

      - name: Wait for indexing
        run: sleep 90

      - name: Publish threecrate-reconstruction
        run: bash scripts/publish-if-needed.sh threecrate-reconstruction

      - name: Wait for indexing
        run: sleep 30

      - name: Publish threecrate-visualization
        run: bash scripts/publish-if-needed.sh threecrate-visualization

      - name: Wait for indexing
        run: sleep 30

      - name: Publish threecrate (umbrella)
        run: bash scripts/publish-if-needed.sh threecrate threecrate-umbrella/Cargo.toml
